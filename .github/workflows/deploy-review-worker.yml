name: Deploy review inbox worker

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy Cloudflare review bridge
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      REVIEW_BRIDGE_GITHUB_TOKEN: ${{ secrets.REVIEW_BRIDGE_GITHUB_TOKEN }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify Cloudflare secrets exist
        run: |
          test -n "$CLOUDFLARE_API_TOKEN" || (echo "Missing CLOUDFLARE_API_TOKEN" && exit 1)
          test -n "$CLOUDFLARE_ACCOUNT_ID" || (echo "Missing CLOUDFLARE_ACCOUNT_ID" && exit 1)

      - name: Validate worker bundle
        run: npm run worker:dry-run

      - name: Deploy worker
        run: npm run worker:deploy

      - name: Set GitHub issue write token for live review notes
        if: ${{ env.REVIEW_BRIDGE_GITHUB_TOKEN != '' }}
        run: printf '%s' "$REVIEW_BRIDGE_GITHUB_TOKEN" | npx wrangler secret put GITHUB_TOKEN

      - name: Missing review bridge GitHub token warning
        if: ${{ env.REVIEW_BRIDGE_GITHUB_TOKEN == '' }}
        run: echo "::warning::REVIEW_BRIDGE_GITHUB_TOKEN is missing. Worker can deploy, but /review-note will return missing_github_token until this secret is added."

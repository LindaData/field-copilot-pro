version: 1
template: agent_company_task_ledger

fields:
  task_id: short unique id
  created_at: ISO timestamp
  created_by: user or agent id
  owner_executive: executive agent id
  owner_specialist: specialist agent id
  priority: low | normal | high | urgent
  status: new | assigned | in_progress | blocked | needs_review | needs_fixes | done | deferred
  repo: owner/name when applicable
  branch: branch name when applicable
  source:
    type: user_message | review_layer | github_issue | email | calendar | file | web | other
    reference: link, path, or short description
  goal: what success means
  acceptance_criteria:
    - clear user-visible or technical acceptance item
  tools_used:
    - tool name
  artifacts:
    - type: file | branch | pull_request | demo_url | log | doc | dataset
      path_or_url: path or URL
      description: short description
  decisions:
    - decision: what was decided
      reason: why
      owner: agent id
  blockers:
    - blocker: blocker description
      requested_resolution: what is needed
      owner: agent id
  qa:
    result: pass | fail | partial | not_run
    notes: short QA notes
  safety:
    result: pass | fail | partial | not_run
    notes: short safety notes
  user_summary: concise final summary

example:
  task_id: hvac-review-feedback-loop
  created_at: 2026-07-01T00:00:00Z
  created_by: user
  owner_executive: cpo
  owner_specialist: review_layer_intake_agent
  priority: high
  status: assigned
  repo: LindaData/field-copilot-pro
  branch: fix/review-layer-feedback-loop
  source:
    type: user_message
    reference: feedback box does not save notes
  goal: Review notes entered in the UI should submit, persist, and become actionable tasks.
  acceptance_criteria:
    - User can type and submit feedback.
    - Submit action returns clear success or failure state.
    - Feedback is stored durably or clearly labeled demo-local.
    - Agent company can read the saved feedback and create tasks.
  tools_used:
    - GitHub connector
    - Codex
  artifacts: []
  decisions: []
  blockers: []
  qa:
    result: not_run
    notes: not implemented yet
  safety:
    result: not_run
    notes: no sensitive data reviewed yet
  user_summary: pending

<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>HVAC Field Copilot</title>
    <script>
      (function () {
        var pathSegmentsToKeep = 1;
        var location = window.location;
        var pathParts = location.pathname.split("/");
        var basePath = pathParts.slice(0, 1 + pathSegmentsToKeep).join("/") + "/";
        var routePath = "/" + pathParts.slice(1 + pathSegmentsToKeep).join("/");
        var query = location.search ? "&q=" + encodeURIComponent(location.search.slice(1)) : "";

        location.replace(
          location.protocol +
            "//" +
            location.hostname +
            (location.port ? ":" + location.port : "") +
            basePath +
            "?p=" +
            encodeURIComponent(routePath) +
            query +
            location.hash
        );
      })();
    </script>
  </head>
  <body></body>
</html>
